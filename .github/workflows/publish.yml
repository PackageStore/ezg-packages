name: Publish UPM packages

on:
  push:
    branches: [ main ]
    paths: [ 'packages/**' ]
  workflow_dispatch:

# write (not read): publish.mjs syncs unity-template.json as part of publishing, and the
# refreshed file is committed back below so the repo doesn't drift from what's on R2.
permissions:
  contents: write

concurrency:
  group: publish-upm
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install publish tooling
        working-directory: scripts
        run: npm install

      - name: Install Unity Package Manager CLI (for signing)
        run: |
          curl -fsSL https://cdn.packages.unity.com/upm-cli/install.sh | bash
          echo "$HOME/.upm/bin" >> "$GITHUB_PATH"

      - name: Validate packages
        run: node scripts/validate.mjs

      # publish.mjs chains sync-unity-template-deps.mjs, so this step also refreshes
      # unity-template.json's dependencies and re-publishes unity-template/latest.json —
      # that is what makes a newly published package show up in Feature Hub's UPM tab.
      - name: Publish new package versions to R2 (signed)
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: company-upm-registry
          REGISTRY_URL: https://upm-registry-worker.developer-a1f.workers.dev
          # Unity service account for `upm pack` signing (Unity 6.3+).
          # All three values are pulled from repo secrets.
          UPM_SERVICE_ACCOUNT_KEY_ID: ${{ secrets.UPM_SERVICE_ACCOUNT_KEY_ID }}
          UPM_SERVICE_ACCOUNT_KEY_SECRET: ${{ secrets.UPM_SERVICE_ACCOUNT_KEY_SECRET }}
          ORGANIZATION_ID: ${{ secrets.ORGANIZATION_ID }}
        run: node scripts/publish.mjs

      # The sync above already pushed the refreshed template to R2 — this only keeps the
      # committed copy in step with it, so a later local run doesn't show a surprise diff.
      # Loop-safe: this workflow only triggers on packages/**, and this commit touches
      # templates/** exclusively. Non-fatal on purpose — if a branch rule rejects the push,
      # the publish and the R2 sync still succeeded and must not be reported as failed.
      - name: Commit refreshed unity-template.json
        continue-on-error: true
        run: |
          if git diff --quiet -- templates/unity-project/unity-template.json; then
            echo "unity-template.json already in sync — nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add templates/unity-project/unity-template.json
          git commit -m "chore(template): sync UPM deps into unity-template.json"
          git push
