name: Publish UPM packages

on:
  push:
    branches: [ main ]
    paths: [ 'packages/**' ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-upm
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install publish tooling
        working-directory: scripts
        run: npm install

      - name: Install Unity Package Manager CLI (for signing)
        run: |
          curl -fsSL https://cdn.packages.unity.com/upm-cli/install.sh | bash
          echo "$HOME/.upm/bin" >> "$GITHUB_PATH"

      - name: Validate packages
        run: node scripts/validate.mjs

      - name: Publish new package versions to R2 (signed)
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: company-upm-registry
          REGISTRY_URL: https://upm-registry-worker.developer-a1f.workers.dev
          # Unity service account for `upm pack` signing (Unity 6.3+).
          # All three values are pulled from repo secrets.
          UPM_SERVICE_ACCOUNT_KEY_ID: ${{ secrets.UPM_SERVICE_ACCOUNT_KEY_ID }}
          UPM_SERVICE_ACCOUNT_KEY_SECRET: ${{ secrets.UPM_SERVICE_ACCOUNT_KEY_SECRET }}
          ORGANIZATION_ID: ${{ secrets.ORGANIZATION_ID }}
        run: node scripts/publish.mjs
